name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Linux (Steam Deck) AppImage 빌드 ─────────────────────
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 & build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-multimedia-dev \
            cmake ninja-build \
            libgl1-mesa-dev libgles2-mesa-dev \
            libxcb-xinerama0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-xkb-dev libxkbcommon-x11-dev \
            libpulse-dev libasound2-dev \
            libfuse2 patchelf

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Create AppImage
        env:
          ARCH: x86_64
        run: |
          # linuxdeploy + Qt plugin 다운로드
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          # AppDir 구성
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/FBNeoRageX AppDir/usr/bin/FBNeoRageX
          cp -r assets AppDir/usr/bin/assets

          # 아이콘
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/fbneoragex.png

          # .desktop 파일
          cat > AppDir/usr/share/applications/fbneoragex.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=FBNeoRageX
          Exec=FBNeoRageX
          Icon=fbneoragex
          Type=Application
          Categories=Game;Emulator;
          Comment=FinalBurn Neo frontend (NeoRageX style)
          DESKTOP

          # AppImage 생성 (FUSE 없이 실행)
          QMAKE=qmake6 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          mv FBNeoRageX-*.AppImage FBNeoRageX_SteamDeck.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: FBNeoRageX_SteamDeck.AppImage

  # ── GitHub Release 생성 ────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build-linux
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Package Windows Build
        run: |
          cd release
          zip -j ../FBNeoRageX_Windows.zip FBNeoRageX.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            FBNeoRageX_Windows.zip
            FBNeoRageX_SteamDeck.AppImage
          body: |
            ## FBNeoRageX ${{ github.ref_name }}

            ### 변경사항
            - 3D 베벨 UI 테두리 (BorderPanel — QLinearGradient 멀티 페이스)
            - 모서리 라운드 처리 (r=9, QPainterPath Antialiasing)
            - 게임리스트 즐겨찾기 필터 탭 (ALL / ★FAV / ☆)
            - 치트 게임 실행 시 로드 (선택 시 버벅임 제거)
            - 넷플레이 READY→START 경쟁조건 수정 (m_npPeerReady 플래그)
            - 넷플레이 READY 300ms 재전송 타이머
            - 롤백 넷코드 (프레임 스냅샷 + 입력 히스토리)

            ### Windows 설치
            1. `FBNeoRageX_Windows.zip` 다운로드 후 압축 해제
            2. `fbneo_libretro.dll` 을 `FBNeoRageX.exe` 옆에 배치
            3. `FBNeoRageX.exe` 실행 — 설치 불필요 (Qt6 정적 단일 실행파일)

            ### Steam Deck / Linux 설치
            1. `FBNeoRageX_SteamDeck.AppImage` 다운로드
            2. 실행 권한 부여: `chmod +x FBNeoRageX_SteamDeck.AppImage`
            3. `fbneo_libretro.so` 를 AppImage 와 같은 폴더에 배치
            4. AppImage 실행 (더블클릭 또는 터미널에서 `./FBNeoRageX_SteamDeck.AppImage`)

            > 코어는 RetroArch 코어 다운로더에서 **FinalBurn Neo** 검색 후 다운로드
